spring.application.name=Job_Application_Tracker

# Railway binds app to this port in production
server.port=${PORT:8080}

# Database (set Railway env vars for production)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/job_tracker?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true

# Secrets (must be set as env vars in Railway)
gemini.api.key=${GEMINI_API_KEY:}
app.jwt.secret=${JWT_SECRET:MySuperSecretKeyForJWTThatIsAtLeast256BitsLong!}

